name: Release or download problem
description: Report a broken release asset, checksum mismatch, or install/download problem.
title: "Release/download: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for problems with published release assets, package-manager downloads, checksums, or installation from this release mirror.

        Do not report security vulnerabilities here. Use a private advisory or email security@lavren.dev.
  - type: input
    id: version
    attributes:
      label: Diaspar version
      description: The release tag or output from `diaspar --version`.
      placeholder: v3.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Linux x86_64
        - Linux arm64
        - Windows x86_64
        - Windows arm64
        - Other
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install or download method
      options:
        - Direct GitHub release asset
        - diaspar.dev download link
        - Homebrew
        - Scoop
        - Other
    validations:
      required: true
  - type: input
    id: asset_url
    attributes:
      label: Asset URL or package command
      placeholder: https://github.com/lavrenlabs/diaspar-releases/releases/download/v3.0.0/...
  - type: textarea
    id: observed
    attributes:
      label: What happened?
      description: Include exact error messages where possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Download ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: checksums
    attributes:
      label: Checksum output
      description: If this is an integrity problem, include the expected checksum and the actual checksum you calculated.
      render: text
  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: This is not a security vulnerability report.
          required: true
        - label: I removed secrets, tokens, and personal data from logs or output.
          required: true
